<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Whisky Cabinet</title>
<!-- App icons / PWA -->
<link rel="icon" href="./favicon.ico?v=20260704" sizes="any">
<link rel="icon" href="./icon.svg?v=20260704" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=20260704">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png?v=20260704">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260704">
<link rel="manifest" href="./manifest.webmanifest?v=20260704">
<meta name="theme-color" content="#4A2F1C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ウイスキー">
<style>
:root{
  --bg:#140f0a; --bg2:#1b140d; --panel:#221a12; --panel2:#2a2016;
  --line:#43331f; --line2:#5a4429;
  --cream:#f5eee2; --muted:#b6a68f; --dim:#8a7a64;
  --gold:#d7a343; --gold2:#f0cb78; --copper:#b06a2c; --cork:#c79a63;
  --amber1:#6b3d12; --amber2:#c8862f; --amber3:#f0cb78;
  --plus:#7db98a; --minus:#e0897f; --wine:#8a4a3c;
  --shadow:0 16px 40px rgba(0,0,0,.42); --shadow-s:0 6px 18px rgba(0,0,0,.3);
  --serif:Georgia,"Times New Roman","Yu Mincho","Hiragino Mincho ProN",serif;
  --sans:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;color:var(--cream);font-family:var(--sans);line-height:1.6;
  background:
    radial-gradient(1200px 480px at 88% -8%,rgba(215,163,67,.14),transparent 60%),
    radial-gradient(900px 500px at 0% 100%,rgba(176,106,44,.10),transparent 55%),
    linear-gradient(180deg,#180f08,var(--bg));
  background-attachment:fixed;}
.num{font-variant-numeric:tabular-nums;letter-spacing:.01em}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--gold2)}
::selection{background:rgba(215,163,67,.3)}

.app{max-width:1240px;margin:auto;padding:20px 18px 60px}

/* ---- ヒーロー ---- */
.hero{position:relative;border:1px solid var(--line);border-radius:22px;padding:26px 26px 22px;margin-bottom:16px;overflow:hidden;
  background:linear-gradient(160deg,rgba(42,32,22,.96),rgba(28,21,14,.98));box-shadow:var(--shadow)}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(90deg,transparent,transparent 6px,rgba(255,255,255,.012) 6px,rgba(255,255,255,.012) 7px)}
.hero-top{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:flex-start;position:relative}
.brand{display:flex;align-items:center;gap:14px}
.brand .glass{font-size:44px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
.brand h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.6vw,36px);margin:0;letter-spacing:.02em;
  background:linear-gradient(180deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .sub{color:var(--muted);font-size:13px;letter-spacing:.16em;text-transform:uppercase;margin-top:2px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ランクリボン */
.rankbar{position:relative;margin-top:18px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
  background:linear-gradient(90deg,rgba(20,14,9,.6),rgba(20,14,9,.2));border:1px solid var(--line);border-radius:14px;padding:12px 15px}
.medal{width:52px;height:52px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:24px;
  background:radial-gradient(circle at 35% 30%,var(--gold2),var(--copper) 78%);color:#2a1a08;
  box-shadow:0 4px 14px rgba(215,163,67,.35),inset 0 -3px 6px rgba(0,0,0,.3);border:2px solid #e7c079}
.rank-mid .rank-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--gold2)}
.rank-mid .rank-meta{color:var(--muted);font-size:12px}
.xpbar{height:9px;background:#0f0b07;border-radius:999px;overflow:hidden;margin-top:7px;border:1px solid #3a2c1b}
.xpbar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--copper),var(--gold2));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.rank-xp{text-align:right}
.rank-xp .big{font-size:22px;font-weight:900;color:var(--gold2);font-family:var(--serif)}
.rank-xp .lbl{color:var(--dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase}

/* ---- ボタン ---- */
.btn{border:1px solid var(--line2);background:linear-gradient(180deg,#2c2318,#241c13);color:var(--cream);
  padding:10px 14px;border-radius:11px;transition:transform .14s,border-color .14s,box-shadow .14s;font-size:14px;white-space:nowrap}
.btn:hover{transform:translateY(-1px);border-color:var(--gold);box-shadow:var(--shadow-s)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(135deg,var(--gold2),var(--copper));color:#241407;border-color:transparent;font-weight:800}
.btn.primary:hover{box-shadow:0 8px 22px rgba(215,163,67,.4)}
.btn.ghost{background:transparent}
.btn.danger{color:#f2b4ad;border-color:#6e4038;background:transparent}
.btn.danger:hover{border-color:var(--minus);background:rgba(138,74,60,.15)}
.btn.good{color:#bff0cd;border-color:#3e6b4d;background:transparent}
.btn.good:hover{border-color:var(--plus);background:rgba(125,185,138,.12)}
.btn.small{padding:7px 10px;font-size:12.5px;border-radius:9px}
.btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ---- ナビ ---- */
.nav{display:flex;gap:6px;overflow-x:auto;position:sticky;top:8px;z-index:30;margin-bottom:16px;padding:7px;
  background:rgba(24,17,10,.82);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;-webkit-overflow-scrolling:touch}
.nav button{flex:1 0 auto;border:1px solid transparent;background:transparent;color:var(--muted);padding:10px 13px;border-radius:10px;
  font-size:13.5px;transition:.14s;display:flex;align-items:center;gap:6px;justify-content:center;white-space:nowrap}
.nav button .ico{font-size:15px}
.nav button:hover{color:var(--cream);background:rgba(215,163,67,.08)}
.nav button.active{background:linear-gradient(135deg,var(--gold2),var(--copper));color:#241407;font-weight:800;border-color:transparent;box-shadow:var(--shadow-s)}

/* ---- カード ---- */
.page{display:none;animation:fade .3s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(180deg,rgba(40,31,21,.96),rgba(30,23,15,.97));border:1px solid var(--line);
  border-radius:16px;padding:18px;box-shadow:var(--shadow-s)}
.grid{display:grid;gap:14px}
.two{grid-template-columns:1fr 1fr}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.section-title h2,.card>h2{font-family:var(--serif);font-size:20px;margin:0;letter-spacing:.01em}
.card h3{font-family:var(--serif);font-size:15px;margin:0 0 8px;color:var(--gold2)}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.muted{color:var(--muted)}.dim{color:var(--dim)}

/* ---- 統計 ---- */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.stat{background:linear-gradient(180deg,rgba(40,31,21,.96),rgba(30,23,15,.97));border:1px solid var(--line);
  border-radius:14px;padding:15px 16px;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;right:-14px;top:-14px;width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle,rgba(215,163,67,.16),transparent 70%)}
.stat .num{font-size:27px;font-weight:900;color:var(--gold2);font-family:var(--serif);line-height:1.1}
.stat .label{color:var(--muted);font-size:12.5px;margin-top:3px}

/* ---- フォーム ---- */
label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line2);border-radius:10px;padding:10px 11px;
  background:#160f09;color:var(--cream);outline:none;transition:border-color .14s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:88px;resize:vertical}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.span2{grid-column:span 2}.span4{grid-column:span 4}
.filters{display:grid;grid-template-columns:2fr repeat(4,1fr);gap:9px;margin-bottom:14px}

/* ---- ボトルグリッド ---- */
.bottle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.bottle{border:1px solid var(--line);border-radius:15px;background:linear-gradient(180deg,#211a12,#1a140d);overflow:hidden;
  transition:transform .16s,border-color .16s,box-shadow .16s;cursor:pointer;position:relative}
.bottle:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
.thumb{aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;font-size:56px;overflow:hidden;position:relative;padding:10px;box-sizing:border-box;
  background:radial-gradient(circle at 50% 120%,rgba(215,163,67,.22),transparent 62%),#140e08}
.thumb img{width:100%;height:100%;min-width:0;min-height:0;display:block;object-fit:contain;object-position:center}
.thumb .rare{position:absolute;top:8px;right:8px;z-index:1;max-width:calc(100% - 16px)}
.bottle-body{padding:13px 14px}
.bottle-body h3{font-family:var(--serif);font-size:16px;margin:0 0 5px;line-height:1.3}
.meta{color:var(--muted);font-size:12px;line-height:1.55}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10.5px;border-radius:999px;padding:4px 9px;background:#2e2318;border:1px solid var(--line2);color:var(--cork)}
.chip.st-open{background:rgba(125,185,138,.14);border-color:#3e6b4d;color:#bff0cd}
.chip.st-sealed{background:rgba(215,163,67,.12);border-color:#6b5227;color:var(--gold2)}
.chip.st-done{background:rgba(138,74,60,.16);border-color:#6e4038;color:#f2b4ad}
.rating{color:var(--gold2);letter-spacing:.05em;font-size:14px}
.price{font-weight:800;color:var(--gold2);font-family:var(--serif)}
.empty{text-align:center;color:var(--muted);padding:34px 16px;border:1px dashed var(--line2);border-radius:14px}

/* ---- グラス(残量) ---- */
.glass{position:relative;width:34px;height:44px;margin:0 auto;flex:none}
.glass .cup{position:absolute;inset:0;border:2px solid var(--line2);border-top:none;border-radius:5px 5px 9px 9px;
  background:rgba(255,255,255,.02);overflow:hidden;clip-path:polygon(8% 0,92% 0,84% 100%,16% 100%)}
.glass .fluid{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--amber3),var(--amber2) 60%,var(--amber1));
  transition:height .6s cubic-bezier(.2,.8,.2,1)}
.glass .fluid::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.28)}

/* ---- レビュー・スライダー・星 ---- */
.review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.review-box{border:1px solid var(--line);background:#191309;padding:12px;border-radius:12px}
.stars{display:flex;gap:5px}
.stars button{background:none;border:0;color:#5b4a34;font-size:26px;padding:0;line-height:1;transition:transform .1s,color .12s}
.stars button.on{color:var(--gold2)}
.stars button:hover{transform:scale(1.15)}
.slider-row{display:grid;grid-template-columns:96px 1fr 30px;gap:9px;align-items:center}
input[type=range]{padding:0;accent-color:var(--gold);cursor:pointer}

/* ---- チャート ---- */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}
.chart-card{min-height:180px}
.flavor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center}
.detail-flavor{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}
canvas{max-width:100%;display:block}
.legend{margin-top:10px;font-size:12.5px}
.legend .row{display:flex;align-items:center;gap:8px;padding:3px 0}
.legend .sw{width:11px;height:11px;border-radius:3px;flex:none}
.legend .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend .vl{font-weight:700;color:var(--gold2)}

/* ---- 開栓・抽選 ---- */
.open-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.open-card{border:1px solid var(--line);border-radius:14px;padding:13px;background:#191309;display:flex;flex-direction:column;gap:8px}
.open-card h3{font-size:14px;margin:0;color:var(--cream);font-family:var(--serif)}
.open-head{display:flex;gap:10px;align-items:center}
.draw-box{min-height:320px;display:grid;place-items:center;text-align:center}
.draw-emoji{font-size:64px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4))}
.reel{font-family:var(--serif);font-size:20px;color:var(--gold2);min-height:28px}

/* ---- 購入予定 ---- */
.wish-list{display:grid;gap:11px}
.wish{display:grid;grid-template-columns:46px 1fr auto;gap:13px;align-items:center;border:1px solid var(--line);
  border-radius:14px;padding:13px;background:#191309}
.wish .rank-badge{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-family:var(--serif);
  font-size:20px;font-weight:900;color:var(--gold2);background:linear-gradient(135deg,#2e2318,#221a12);border:1px solid var(--line2)}

/* ---- バッジ ---- */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.badge{border:1px solid var(--line);border-radius:14px;padding:15px 13px;text-align:center;background:#191309;transition:.16s;position:relative}
.badge.got{border-color:var(--line2);background:linear-gradient(180deg,rgba(215,163,67,.09),#191309)}
.badge.locked{opacity:.5;filter:grayscale(.7)}
.badge .em{font-size:34px;display:block;margin-bottom:7px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
.badge .bn{font-family:var(--serif);font-size:14px;font-weight:700}
.badge .bd{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.badge .got-tag{position:absolute;top:8px;right:9px;font-size:9px;letter-spacing:.1em;color:var(--gold2)}

/* ---- スナップショット/テーブル ---- */
.tblwrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
th,td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--dim);font-weight:600;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;background:rgba(20,14,9,.5)}
td.r,th.r{text-align:right}
tr:hover td{background:rgba(215,163,67,.05)}

/* ---- 通知・モーダル ---- */
.notice{border:1px solid #5f4b31;background:linear-gradient(180deg,rgba(46,36,24,.9),rgba(38,30,20,.9));
  color:#e7d5b8;padding:12px 13px;border-radius:11px;font-size:13px;line-height:1.65}
.notice.info{border-color:#3d5566;background:rgba(28,40,50,.5);color:#cfe1ec}
.notice.err{border-color:#6e4038;background:rgba(56,32,28,.5);color:#f2c4bd}
.modal{position:fixed;inset:0;background:rgba(8,5,3,.78);display:none;place-items:center;padding:16px;z-index:100;backdrop-filter:blur(4px)}
.modal.open{display:grid}
.modal-inner{width:min(820px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#241c13,#1c150d);
  border:1px solid var(--line2);border-radius:20px;padding:22px;box-shadow:var(--shadow)}
.detail-top{display:grid;grid-template-columns:minmax(260px,320px) 1fr;gap:20px;align-items:start}
.detail-img{aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:70px;background:#140e08;border:1px solid var(--line);border-radius:15px;overflow:hidden;padding:12px;box-sizing:border-box}
.detail-img img{width:100%;height:100%;min-width:0;min-height:0;display:block;object-fit:contain;object-position:center}
.reviewers{display:grid;gap:9px}
.reviewer{display:grid;grid-template-columns:1fr auto;gap:8px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:200;
  background:linear-gradient(135deg,#2c2318,#211a12);border:1px solid var(--gold);color:var(--cream);
  padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);transition:.35s;display:flex;align-items:center;gap:10px;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast .em{font-size:22px}
.toast .tt{font-family:var(--serif);font-weight:700}
.toast .td{font-size:12px;color:var(--muted)}
.footer{text-align:center;color:var(--dim);font-size:12px;padding:28px 0 4px;font-family:var(--serif);letter-spacing:.06em}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:980px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .bottle-grid{grid-template-columns:repeat(2,1fr)}
  .open-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:repeat(2,1fr)}.span4{grid-column:span 2}
  .filters{grid-template-columns:1fr 1fr}
  .chart-grid,.two,.review-grid{grid-template-columns:1fr}
  .detail-top{grid-template-columns:1fr}
  .detail-img{width:min(100%,420px);margin-inline:auto}
  .flavor-wrap,.detail-flavor{grid-template-columns:1fr}
}
@media(max-width:560px){
  .app{padding:12px 10px 50px}
  .stats,.bottle-grid,.open-grid,.form-grid,.filters{grid-template-columns:1fr}
  .span2,.span4{grid-column:span 1}
  .rankbar{grid-template-columns:auto 1fr;gap:11px}.rank-xp{grid-column:2;text-align:left}
  .wish{grid-template-columns:40px 1fr}.wish .actions{grid-column:2}
}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="hero-top">
    <div class="brand">
      <span class="glass">🥃</span>
      <div><h1>Whisky Cabinet</h1><div class="sub">Tasting Journal &amp; Collection</div></div>
    </div>
    <div class="hero-actions">
      <button class="btn primary" onclick="go('form');newBottle()">＋ ボトルを棚に加える</button>
      <button class="btn ghost" onclick="exportJSON()">バックアップ</button>
      <button class="btn ghost" onclick="document.getElementById('importFile').click()">復元</button>
      <input id="importFile" hidden type="file" accept=".json" onchange="importJSON(event)">
    </div>
  </div>
  <div class="rankbar" id="rankbar"></div>
</header>

<nav class="nav" id="nav"></nav>
<main id="main"></main>
<div class="footer" id="footer"></div>
</div>
<div id="detailModal" class="modal" onclick="if(event.target===this)closeDetail()"><div class="modal-inner"><div class="section-title"><h2>ボトルの記録</h2><button class="btn small" onclick="closeDetail()">閉じる</button></div><div id="detailContent"></div></div></div>
<div id="toastHost"></div>
<script>
/* ===== Whisky Cabinet v1.0.2 コア ===== */
const APP_VERSION="1.0.2", DATA_VERSION=2;
const KEY="whisky_cabinet_v1";
const OLD_KEYS=["whisky_cabinet_v03","whisky_cabinet_v02","whisky_cellar_v01"];

const tasteDefs=[["smoky","スモーキー"],["sweet","甘さ"],["fruity","フルーティー"],["spicy","スパイシー"],["smooth","スムース"],["body","ボディ"],["finish","余韻"]];
const countries=["スコットランド","日本","アメリカ","アイルランド","カナダ","台湾","インド","イングランド","ウェールズ","フランス","オーストラリア","その他"];
const regions=["アイラ","スペイサイド","ハイランド","ローランド","キャンベルタウン","アイランズ","テネシー","ケンタッキー","その他"];
const types=["シングルモルト","ブレンデッド","ブレンデッドモルト","グレーン","バーボン","テネシーウイスキー","ライ","アイリッシュ","ジャパニーズ","コーン","その他"];
const STATUSES=["未開栓","開栓済み","飲み切り","手放した"];
const CHART_COLORS=["#d7a343","#c8862f","#b06a2c","#e0b060","#8a5a24","#c79a63","#9c6b3a","#e7c079","#7a4e28","#d0a24e"];

/* ---- 利き酒師ランク ---- */
const RANKS=[
  {name:"見習い",min:0,em:"🌱"},
  {name:"愛好家",min:100,em:"🥃"},
  {name:"目利き",min:280,em:"👀"},
  {name:"鑑定家",min:560,em:"🔎"},
  {name:"利き酒師",min:1000,em:"🎖️"},
  {name:"マスター・オブ・モルト",min:1700,em:"👑"},
  {name:"リビング・レジェンド",min:2800,em:"🏆"}
];
function calcXP(st){
  let xp=0;
  for(const b of (st.bottles||[])){
    if(b.sample||b.status==="手放した")continue; // サンプルはXP対象外
    xp+=10; // 登録
    xp+=Object.values(b.ratings||{}).filter(v=>Number(v)>0).length*5; // レビュー
    if(tasteDefs.some(([k])=>Number(b.taste?.[k])>0))xp+=5; // フレーバー記録
    if(b.image)xp+=3; // 写真
    if(b.status==="開栓済み"||b.status==="飲み切り")xp+=15; // 開栓経験
    if(b.status==="飲み切り")xp+=30; // 完飲
  }
  xp+=(st.snapshots||[]).filter(s=>!s.sample).length*8; // サンプル棚卸しは対象外
  xp+=Object.keys(st.badges||{}).length*20; // バッジ
  return xp;
}
function rankInfo(xp){
  let idx=0;
  for(let i=0;i<RANKS.length;i++)if(xp>=RANKS[i].min)idx=i;
  const cur=RANKS[idx], next=RANKS[idx+1]||null;
  const base=cur.min, span=next?next.min-base:1, into=xp-base;
  return {cur,next,idx,pct:next?Math.min(100,into/span*100):100,toNext:next?next.min-xp:0};
}

function migrateOld(old){
  const r1=uid(),r2=uid();
  return {dataVersion:DATA_VERSION,
    reviewers:Array.isArray(old.reviewers)&&old.reviewers.length?old.reviewers:[{id:r1,name:"レビュアー1"},{id:r2,name:"レビュアー2"}],
    bottles:(old.bottles||[]).map(b=>({...b,ratings:b.ratings||(("ratingJun"in b||"ratingMai"in b)?{[r1]:b.ratingJun||0,[r2]:b.ratingMai||0}:{}),rarity:Number(b.rarity)||1,taste:b.taste||{},tags:b.tags||[]})),
    wishlist:old.wishlist||[],snapshots:old.snapshots||[],badges:old.badges||{},
    settings:Object.assign({maxOpen:10,staleDays:60},old.settings||{}),
    changelog:old.changelog||[{v:"1.0.0",d:today(),t:"旧バージョンから移行"}]};
}
function normalize(s){
  const oldVersion=Number(s?.dataVersion)||1;
  s.dataVersion=DATA_VERSION;
  s.reviewers=Array.isArray(s.reviewers)&&s.reviewers.length?s.reviewers:[{id:uid(),name:"レビュアー1"}];
  s.bottles=Array.isArray(s.bottles)?s.bottles.map(b=>({...b,ratings:b.ratings&&typeof b.ratings==="object"?b.ratings:{},rarity:Number(b.rarity)||1,taste:b.taste&&typeof b.taste==="object"?b.taste:{},tags:Array.isArray(b.tags)?b.tags:[],remaining:b.remaining==null?100:Number(b.remaining)})):[];
  s.wishlist=Array.isArray(s.wishlist)?s.wishlist:[];
  s.snapshots=Array.isArray(s.snapshots)?s.snapshots:[];
  s.badges=s.badges&&typeof s.badges==="object"&&!Array.isArray(s.badges)?s.badges:{};
  s.settings=Object.assign({maxOpen:10,staleDays:60},s.settings&&typeof s.settings==="object"?s.settings:{});
  s.settings.maxOpen=Math.max(1,Math.min(30,Number(s.settings.maxOpen)||10));
  s.changelog=Array.isArray(s.changelog)?s.changelog:[{v:APP_VERSION,d:today(),t:"初版"}];
  if(oldVersion<2){
    // v1.0.0でサンプルから獲得した可能性のあるバッジを、実データだけで再検証する。
    const oldBadges={...s.badges},clean={};
    const realView={...s,bottles:s.bottles.filter(b=>!b.sample),snapshots:s.snapshots.filter(x=>!x.sample),badges:{}};
    for(const badge of BADGES)if(oldBadges[badge.id]&&badge.test(realView))clean[badge.id]=oldBadges[badge.id];
    s.badges=clean;
    if(!s.changelog.some(c=>c.v==="1.0.1"))s.changelog.push({v:"1.0.1",d:today(),t:"サンプル実績除外・日付・抽選・復元・保存安全性を修正"});
  }
  if(!s.changelog.some(c=>c.v==="1.0.2"))s.changelog.push({v:"1.0.2",d:today(),t:"写真を高解像度化し、一覧・詳細・抽選画面で切り抜かず全体表示するよう改善"});
  return s;
}
function loadState(){
  try{
    const v=localStorage.getItem(KEY);
    if(v)return normalize(JSON.parse(v));
    for(const ok of OLD_KEYS){const o=localStorage.getItem(ok);if(o)return normalize(migrateOld(JSON.parse(o)));}
  }catch(e){console.error("load失敗",e);}
  return freshState(true); // 完全新規のみサンプル入り
}

function persist(){
  const initial=knownBadges===null,awarded=checkBadges(false);
  try{
    localStorage.setItem(KEY,JSON.stringify(state));
  }catch(e){
    for(const id of awarded)delete state.badges[id];
    console.error("保存失敗",e);
    toast("⚠️","保存に失敗","ブラウザ容量超過の可能性があります。写真を減らすかバックアップを保存してください。");
    alert("保存に失敗しました。写真データによるブラウザ容量超過の可能性があります。今回の変更は再読み込み後に失われることがあります。");
    renderAll();return false;
  }
  if(!initial)for(const id of awarded){const b=BADGES.find(x=>x.id===id);if(b)toast(b.em,"バッジ獲得！",b.name);}
  knownBadges=Object.keys(state.badges);
  renderAll();return true;
}

/* ---- トースト ---- */
function toast(em,tt,td){
  const host=document.getElementById("toastHost");
  const el=document.createElement("div");el.className="toast";
  el.innerHTML=`<span class="em">${em}</span><div><div class="tt">${escapeHtml(tt)}</div>${td?`<div class="td">${escapeHtml(td)}</div>`:""}</div>`;
  host.appendChild(el);requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{el.classList.remove("show");setTimeout(()=>el.remove(),400);},3200);
}

/* ---- バッジ解除検知 ---- */
function checkBadges(notify=true){
  const initial=knownBadges===null,awarded=[];
  for(const b of BADGES){
    if(b.test(state)&&!state.badges[b.id]){state.badges[b.id]=today();awarded.push(b.id);}
  }
  if(initial)knownBadges=Object.keys(state.badges).slice();
  if(notify&&!initial)for(const id of awarded){const b=BADGES.find(x=>x.id===id);if(b)toast(b.em,"バッジ獲得！",b.name);}
  return awarded;
}

/* ===== Canvasグラフ ===== */
function setupCanvas(cv,w,h){const dpr=window.devicePixelRatio||1;cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";const c=cv.getContext("2d");c.scale(dpr,dpr);c.clearRect(0,0,w,h);return c;}

function drawRadar(cv,labels,values,max){
  const w=cv.clientWidth||300,h=240,c=setupCanvas(cv,w,h);
  const cx=w/2,cy=h/2+6,R=Math.min(w,h)/2-34,N=labels.length;
  const ang=i=>-Math.PI/2+i/N*Math.PI*2;
  // グリッド
  for(let ring=1;ring<=4;ring++){
    c.beginPath();
    for(let i=0;i<=N;i++){const r=R*ring/4,a=ang(i%N);const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y);}
    c.strokeStyle="rgba(215,163,67,.13)";c.stroke();
  }
  for(let i=0;i<N;i++){const a=ang(i);c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));c.strokeStyle="rgba(215,163,67,.13)";c.stroke();}
  // 値
  const hasData=values.some(v=>v>0);
  if(hasData){
    c.beginPath();
    values.forEach((v,i)=>{const r=R*Math.min(1,(v||0)/max),a=ang(i);const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y);});
    c.closePath();
    const g=c.createRadialGradient(cx,cy,0,cx,cy,R);g.addColorStop(0,"rgba(240,203,120,.5)");g.addColorStop(1,"rgba(176,106,44,.35)");
    c.fillStyle=g;c.fill();c.strokeStyle="#f0cb78";c.lineWidth=2;c.stroke();
    values.forEach((v,i)=>{const r=R*Math.min(1,(v||0)/max),a=ang(i);c.beginPath();c.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),3,0,7);c.fillStyle="#f0cb78";c.fill();});
  }
  // ラベル
  c.fillStyle="#b6a68f";c.font="11px system-ui";c.textAlign="center";c.textBaseline="middle";
  labels.forEach((l,i)=>{const a=ang(i),lr=R+16;let x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);
    c.textAlign=Math.abs(Math.cos(a))<0.3?"center":(Math.cos(a)>0?"left":"right");c.fillText(l,x,y);});
  if(!hasData){c.fillStyle="#8a7a64";c.textAlign="center";c.fillText("フレーバー記録がまだありません",cx,cy);}
}

function drawDonut(cv,data){
  const w=cv.clientWidth||300,h=210,c=setupCanvas(cv,w,h);
  const total=data.reduce((s,d)=>s+Math.max(0,d[1]),0);
  const cx=w/2,cy=h/2,R=Math.min(w,h)/2-10,ir=R*.6;
  if(total<=0){c.fillStyle="#8a7a64";c.font="13px system-ui";c.textAlign="center";c.fillText("データがありません",cx,cy);return;}
  let a=-Math.PI/2;
  data.forEach((d,i)=>{const v=Math.max(0,d[1]);if(v<=0)return;const a2=a+v/total*Math.PI*2;
    c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,R,a,a2);c.closePath();c.fillStyle=CHART_COLORS[i%CHART_COLORS.length];c.fill();a=a2;});
  c.globalCompositeOperation="destination-out";c.beginPath();c.arc(cx,cy,ir,0,7);c.fill();c.globalCompositeOperation="source-over";
  c.fillStyle="#f0cb78";c.font="700 22px Georgia,serif";c.textAlign="center";c.fillText(total,cx,cy+2);
  c.fillStyle="#8a7a64";c.font="10px system-ui";c.fillText("本",cx,cy+18);
}
function donutLegend(data){
  const total=data.reduce((s,d)=>s+Math.max(0,d[1]),0)||1;
  return `<div class="legend">${data.map((d,i)=>`<div class="row"><span class="sw" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></span><span class="nm">${escapeHtml(d[0])}</span><span class="vl">${d[1]}本</span><span class="dim">${(d[1]/total*100).toFixed(0)}%</span></div>`).join("")}</div>`;
}

function drawBars(cv,data,max){
  const w=cv.clientWidth||300,rows=data.length,rh=30,h=Math.max(120,rows*rh+16),c=setupCanvas(cv,w,h);
  const m=max||Math.max(...data.map(d=>d[1]),1),labelW=104,barX=labelW+8,barW=w-barX-44;
  data.forEach((d,i)=>{const y=12+i*rh;
    c.fillStyle="#b6a68f";c.font="12px system-ui";c.textAlign="left";c.textBaseline="middle";
    c.fillText(d[0].length>8?d[0].slice(0,7)+"…":d[0],0,y+7);
    c.fillStyle="#15100a";c.strokeStyle="#3b2f22";
    roundRect(c,barX,y,barW,13,6);c.fill();c.stroke();
    const bw=Math.max(3,d[1]/m*barW);const g=c.createLinearGradient(barX,0,barX+bw,0);g.addColorStop(0,"#8d5a1d");g.addColorStop(1,"#f0cb78");
    c.fillStyle=g;roundRect(c,barX,y,bw,13,6);c.fill();
    c.fillStyle="#f0cb78";c.font="700 12px Georgia,serif";c.textAlign="left";c.fillText(Number.isInteger(d[1])?d[1]:d[1].toFixed(1),barX+bw+7,y+7);
  });
}
function roundRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

function drawLine(cv,points){
  const w=cv.clientWidth||600,h=220,c=setupCanvas(cv,w,h);
  if(!points.length){c.fillStyle="#8a7a64";c.font="13px system-ui";c.textAlign="center";c.fillText("棚卸し記録がまだありません",w/2,h/2);return;}
  const pad={l:58,r:14,t:14,b:26};
  const ys=points.map(p=>p.y);let ymin=Math.min(...ys),ymax=Math.max(...ys);if(ymin===ymax){ymin=Math.max(0,ymin-1);ymax+=1;}
  const sp=ymax-ymin;ymin=Math.max(0,ymin-sp*.1);ymax+=sp*.1;
  const X=i=>points.length===1?(pad.l+(w-pad.l-pad.r)/2):pad.l+(w-pad.l-pad.r)*i/(points.length-1);
  const Y=v=>pad.t+(h-pad.t-pad.b)*(1-(v-ymin)/(ymax-ymin||1));
  c.strokeStyle="rgba(215,163,67,.12)";c.fillStyle="#8a7a64";c.font="10px system-ui";c.textAlign="right";c.textBaseline="middle";
  for(let g=0;g<=4;g++){const v=ymin+(ymax-ymin)*g/4,y=Y(v);c.beginPath();c.moveTo(pad.l,y);c.lineTo(w-pad.r,y);c.stroke();c.fillText(Math.round(v),pad.l-6,y);}
  const grad=c.createLinearGradient(0,pad.t,0,h-pad.b);grad.addColorStop(0,"rgba(240,203,120,.28)");grad.addColorStop(1,"rgba(240,203,120,0)");
  c.beginPath();points.forEach((p,i)=>{const x=X(i),y=Y(p.y);i?c.lineTo(x,y):c.moveTo(x,y);});
  c.lineTo(X(points.length-1),h-pad.b);c.lineTo(X(0),h-pad.b);c.closePath();c.fillStyle=grad;c.fill();
  c.beginPath();points.forEach((p,i)=>{const x=X(i),y=Y(p.y);i?c.lineTo(x,y):c.moveTo(x,y);});c.strokeStyle="#f0cb78";c.lineWidth=2;c.stroke();
  c.fillStyle="#f0cb78";points.forEach((p,i)=>{c.beginPath();c.arc(X(i),Y(p.y),3,0,7);c.fill();});
  c.fillStyle="#8a7a64";c.textAlign="center";c.textBaseline="alphabetic";const step=Math.max(1,Math.ceil(points.length/6));
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)c.fillText((p.x||"").slice(5),X(i),h-8);});
}

async function compressImage(file){
  if(!file)return"";
  if(file.type&&!file.type.startsWith("image/"))throw new Error("画像ファイルを選択してください");
  const objectUrl=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>rej(new Error("画像を読み込めませんでした"));i.src=objectUrl;});
    const max=1200,scale=Math.min(1,max/Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height)),cv=document.createElement("canvas");
    cv.width=Math.max(1,Math.round((img.naturalWidth||img.width)*scale));cv.height=Math.max(1,Math.round((img.naturalHeight||img.height)*scale));
    const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";ctx.drawImage(img,0,0,cv.width,cv.height);
    return cv.toDataURL("image/jpeg",.82);
  }finally{URL.revokeObjectURL(objectUrl);}
}

  let openedDate=g("f_openedDate").value||((status==="開栓済み"&&existing?.status!=="開栓済み")?today():existing?.openedDate||"");
  let remaining=Number(g("f_remaining").value);if(status==="飲み切り")remaining=0;if(status==="未開栓"){remaining=100;openedDate="";}
  const b={id:id||uid(),name:g("f_name").value.trim(),brand:g("f_brand").value.trim(),country:g("f_country").value,region:g("f_region").value,type:g("f_type").value,

  state.bottles=id?state.bottles.map(x=>x.id===id?b:x):[b,...state.bottles];

}

function renderDraw(){
  const box=document.getElementById("drawBox");if(!box)return;
  const open=state.bottles.filter(b=>b.status==="開栓済み").length,max=state.settings.maxOpen;
  const sealed=state.bottles.filter(b=>b.status==="未開栓");
  if(open>=max){box.innerHTML=`<div><div class="draw-emoji">🔒</div><h2 style="font-family:var(--serif)">開栓枠が満杯</h2><p class="muted">1本を飲み切ると、新しい一本を抽選できます。</p></div>`;return;}
  if(!sealed.length){box.innerHTML=`<div><div class="draw-emoji">📭</div><h2 style="font-family:var(--serif)">未開栓ボトルがありません</h2><p class="muted">棚にボトルを加えましょう。</p></div>`;return;}
  box.innerHTML=`<div><div class="draw-emoji">🎲</div><h2 style="font-family:var(--serif)">次に開ける一本</h2><p class="muted">未開栓 ${sealed.length}本 から運命の一本を選びます。</p><div class="reel" id="reel"></div><button class="btn primary" id="drawBtn" onclick="spinDraw()">抽選する</button></div>`;
}
function spinDraw(){
  cancelDrawSpin();
  const sealed=state.bottles.filter(b=>b.status==="未開栓");if(!sealed.length||currentPage!=="opening")return;
  const reel=document.getElementById("reel"),btn=document.getElementById("drawBtn");if(!reel||!btn)return;btn.disabled=true;
  const token=drawToken;let n=0;const total=16+Math.floor(Math.random()*6);
  const tick=()=>{
    if(token!==drawToken||currentPage!=="opening"||!document.getElementById("reel")){drawTimer=null;return;}
    const current=state.bottles.filter(b=>b.status==="未開栓");if(!current.length){renderDraw();return;}
    const b=current[Math.floor(Math.random()*current.length)],liveReel=document.getElementById("reel");if(!liveReel)return;
    liveReel.textContent="🥃 "+b.name;n++;
    if(n<total)drawTimer=setTimeout(tick,60+n*11);else{drawTimer=null;finalizeDraw(token);}
  };
  tick();
}
function finalizeDraw(token=drawToken){
  if(token!==drawToken||currentPage!=="opening")return;
  const box=document.getElementById("drawBox"),sealed=state.bottles.filter(b=>b.status==="未開栓");if(!box||!sealed.length){renderDraw();return;}
  const b=sealed[Math.floor(Math.random()*sealed.length)];drawnBottleId=b.id;
  box.innerHTML=`<div>${b.image?`<img src="${b.image}" alt="${escapeHtml(b.name)}" decoding="async" style="width:min(240px,100%);height:260px;object-fit:contain;object-position:center;padding:10px;box-sizing:border-box;background:#140e08;border-radius:14px;border:1px solid var(--line2);display:block;margin:0 auto">`:`<div class="draw-emoji">🥃</div>`}
    <h2 style="font-family:var(--serif);margin:10px 0 2px">${escapeHtml(b.name)}</h2><p class="muted">${escapeHtml(b.country)}・${escapeHtml(b.type)}${b.age?`・${b.age}年`:""}</p>
    <div class="price" style="font-size:18px">${priceText(b.price)}</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button class="btn primary" onclick="confirmOpenDrawn()">この一本を開ける</button><button class="btn ghost" onclick="renderDraw()">もう一度</button></div></div>`;
}
function confirmOpenDrawn(){
  const b=state.bottles.find(x=>x.id===drawnBottleId);if(!b)return;
  if(state.bottles.filter(x=>x.status==="開栓済み").length>=state.settings.maxOpen){alert("開栓枠が満杯です。");return;}

function takeSnapshot(){
  const ow=owned(state);
  const snap={id:uid(),date:today(),time:nowTime(),owned:ow.length,
    unopened:state.bottles.filter(b=>b.status==="未開栓").length,
    opened:state.bottles.filter(b=>b.status==="開栓済み").length,
    finished:state.bottles.filter(b=>b.status==="飲み切り").length,
    totalValue:ow.reduce((s,b)=>s+(Number(b.price)||0),0),memo:"",
    sample:state.bottles.length>0&&state.bottles.every(b=>b.sample)};
  const same=state.snapshots.filter(s=>s.date===snap.date);
  if(same.length&&!confirm(`本日(${snap.date})の記録が既にあります。追加で記録しますか？（キャンセルで中止）`))return;
  state.snapshots.push(snap);persist();toast("📖","棚卸しを記録しました",`所有 ${snap.owned}本 / ${snap.totalValue.toLocaleString()}円`);
}

function addReviewer(){const el=document.getElementById("newReviewer"),name=el.value.trim();if(!name)return;if(state.reviewers.length>=10){alert("レビュアーは最大10人です。");return;}state.reviewers.push({id:uid(),name});el.value="";persist();}
function renameReviewer(id,name){const r=state.reviewers.find(x=>x.id===id);if(r&&name.trim()){r.name=name.trim();persist();}}
function removeReviewer(id){if(state.reviewers.length<=1){alert("レビュアーは最低1人必要です。");return;}const r=state.reviewers.find(x=>x.id===id);if(!r||!confirm(`「${r.name}」を削除しますか？この人の評価も消えます。`))return;state.reviewers=state.reviewers.filter(x=>x.id!==id);state.bottles.forEach(b=>{if(b.ratings)delete b.ratings[id];});persist();}
function saveSettings(){
  const v=Number(document.getElementById("setMaxOpen").value),openN=state.bottles.filter(b=>b.status==="開栓済み").length;
  if(!Number.isInteger(v)||v<1||v>30){alert("開栓上限は1〜30の整数で入力してください。");return;}
  if(v<openN){alert(`現在${openN}本を開栓中のため、上限を${v}本には変更できません。`);return;}
  state.settings.maxOpen=v;persist();toast("⚙️","設定を保存しました");
}

function validateBackupData(data){
  if(!data||typeof data!=="object"||Array.isArray(data))throw new Error("ルート形式が不正です");
  if(!Array.isArray(data.reviewers)||!data.reviewers.length)throw new Error("レビュアー情報が不正です");
  const ids=new Set();
  for(const r of data.reviewers){if(!r||typeof r!=="object"||typeof r.id!=="string"||!r.id||typeof r.name!=="string"||!r.name.trim()||ids.has(r.id))throw new Error("レビュアー情報が不正です");ids.add(r.id);}
  if(!Array.isArray(data.bottles))throw new Error("ボトル情報が不正です");
  const allowed=new Set(STATUSES);
  for(const b of data.bottles){
    if(!b||typeof b!=="object"||typeof b.id!=="string"||!b.id||typeof b.name!=="string"||!b.name.trim()||!allowed.has(b.status))throw new Error("ボトル情報が不正です");
    if(b.remaining!=null&&(!Number.isFinite(Number(b.remaining))||Number(b.remaining)<0||Number(b.remaining)>100))throw new Error("残量が不正です");
    if(b.ratings!=null&&(typeof b.ratings!=="object"||Array.isArray(b.ratings)))throw new Error("評価情報が不正です");
  }
  for(const k of ["wishlist","snapshots","changelog"])if(data[k]!=null&&!Array.isArray(data[k]))throw new Error(`${k}が不正です`);
  if(data.badges!=null&&(typeof data.badges!=="object"||Array.isArray(data.badges)))throw new Error("バッジ情報が不正です");
  if(data.settings!=null){if(typeof data.settings!=="object"||Array.isArray(data.settings))throw new Error("設定が不正です");const m=Number(data.settings.maxOpen);if(data.settings.maxOpen!=null&&(!Number.isInteger(m)||m<1||m>30))throw new Error("開栓上限が不正です");}
  return true;
}
function exportJSON(){download(`whisky_cabinet_backup_${today()}.json`,JSON.stringify(state,null,2),"application/json");toast("📥","バックアップを保存しました");}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const raw=JSON.parse(r.result);validateBackupData(raw);const data=normalize(raw);if(confirm("現在のデータを、読み込むデータで置き換えますか？（先に現在のデータをバックアップ推奨）")){const previous=state;state=data;knownBadges=null;if(persist()){toast("♻️","復元しました");go("dashboard");}else state=previous;}}catch(err){console.error(err);alert("バックアップファイルの形式が正しくありません。復元は行われませんでした。");}e.target.value="";};
  r.onerror=()=>{alert("バックアップファイルを読み込めませんでした。");e.target.value="";};
  r.readAsText(f);}
function exportCSV(){
  const H=["name","brand","country","region","type","age","abv","volume","price","purchaseDate","openedDate","status","remaining","rarity","averageRating","tags","notes"];
  const rows=[H,...state.bottles.map(b=>H.map(h=>h==="averageRating"?avgRating(b).toFixed(2):h==="tags"?(b.tags||[]).join("|"):(b[h]??"")))];
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\r\n");
  download(`whisky_cabinet_${today()}.csv`,csv,"text/csv");toast("📄","CSVを出力しました");}
function download(name,text,type){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800);}
function addSample(){
  if(anyRealData()){alert("すでに実データがあるため、サンプルは作成しません（データ保護）。");return;}
  if(state.bottles.some(b=>b.sample)){toast("ℹ️","サンプルは既にあります");return;}
  const fs=freshState(true),reviewerId=state.reviewers[0]?.id;
  state.bottles=fs.bottles.map(b=>({...b,ratings:reviewerId?{[reviewerId]:Number(Object.values(b.ratings||{})[0])||0}:{}}));
  persist();toast("🥃","サンプルを作成しました");go("dashboard");
}function removeSample(){
  const n=state.bottles.filter(b=>b.sample).length;if(!n){toast("ℹ️","サンプルはありません");return;}
  state.bottles=state.bottles.filter(b=>!b.sample);state.snapshots=state.snapshots.filter(s=>!s.sample);
  const clean={};for(const badge of BADGES)if(state.badges[badge.id]&&badge.test(state))clean[badge.id]=state.badges[badge.id];state.badges=clean;
  knownBadges=Object.keys(clean);persist();toast("🧹","サンプルを削除しました");
}
function resetAll(){if(!confirm("すべてのデータを初期化しますか？この操作は元に戻せません。"))return;if(!confirm("本当に初期化しますか？"))return;state=freshState(false);knownBadges=null;persist();toast("♻️","初期化しました");go("dashboard");}
function runIntegrity(){
  const out=[];const seen=new Map();
  for(const b of state.bottles){
    if(!b.name||!b.name.trim())out.push("名前のないボトルがあります");
    if(b.remaining<0||b.remaining>100)out.push(`残量が範囲外：${b.name}（${b.remaining}）`);
    if(b.status==="開栓済み"&&(b.remaining===0))out.push(`開栓中なのに残量0：${b.name}`);
    if(b.price<0)out.push(`価格がマイナス：${b.name}`);
    const k=(b.name||"")+"|"+(b.brand||"")+"|"+(b.age||"");
    if(seen.has(k))out.push(`同名ボトルの重複の可能性：${b.name}`);seen.set(k,1);
  }
  const openN=state.bottles.filter(b=>b.status==="開栓済み").length;
  if(openN>state.settings.maxOpen)out.push(`開栓中が上限(${state.settings.maxOpen})を超えています：${openN}本`);
  document.getElementById("intOut").innerHTML=out.length?out.map(w=>`<div class="notice">${escapeHtml(w)}</div>`).join(""):`<div class="notice info">問題は見つかりませんでした。</div>`;
}

/* ===== 全体レンダリング ===== */
function renderAll(){renderRankbar();if(currentPage==="dashboard")vDashboard(document.getElementById("main"));else if(currentPage==="bottles")refreshBottles();else if(currentPage==="opening")vOpening(document.getElementById("main"));else if(currentPage==="ranks")vRanks(document.getElementById("main"));else if(currentPage==="wishlist")vWishlist(document.getElementById("main"));else if(currentPage==="snapshots")vSnapshots(document.getElementById("main"));else if(currentPage==="settings"){renderReviewerList();}else if(currentPage==="form")renderRatingEditors();}
function init(){
  document.getElementById("footer").textContent=`Whisky Cabinet v${APP_VERSION} — Standalone browser app`;
  const awarded=checkBadges(false);try{if(awarded.length)localStorage.setItem(KEY,JSON.stringify(state));}catch(e){console.error("初期保存失敗",e);}knownBadges=Object.keys(state.badges);
  renderNav();renderRankbar();render();window.addEventListener("resize",()=>{if(["dashboard","snapshots"].includes(currentPage))render();});
}
init();
